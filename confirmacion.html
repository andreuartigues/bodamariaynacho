<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Confirmació – Maria & Nacho</title>
  
  <!-- Google Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600;700&family=Montserrat:wght@300;400;500&display=swap" rel="stylesheet">
  
  <!-- CSS externo -->
  <link rel="stylesheet" href="styles.css">
  <link rel="stylesheet" href="confirmation.css">
</head>
<body>

  <!-- NAVEGACIÓN STICKY -->
  <nav class="navbar">
    <div class="nav-container">
      <a href="index.html" class="nav-brand">Maria & Nacho - Sa Nostra Boda</a>
      <ul class="nav-menu">
        <li><a href="index.html">Home</a></li>
        <li><a href="confirmacion.html">Confirmació</a></li>
        <li><a href="info.html">Més Info</a></li>
      </ul>
      <div class="hamburger">
        <span></span>
        <span></span>
        <span></span>
      </div>
    </div>
  </nav>

  <!-- CONFIRMACIÓN -->
  <section class="confirmation-page">
    <div class="container-wide">
      <div class="confirmation-header">
        <div class="section-header">
          <div class="decorative-line"></div>
          <h1>Confirmació d'Assistència</h1>
          <div class="decorative-line"></div>
        </div>
      </div>

      <div class="form-card-wide">
        <form id="rsvp-form">
          <div class="form-row">
            <div class="form-group">
              <label for="name">Nom complet *</label>
              <input 
                type="text" 
                id="name" 
                placeholder="Posa es teu nom" 
                required 
                autocomplete="name"
              >
            </div>

            <div class="form-group">
              <label for="email">Email *</label>
              <input 
                type="email" 
                id="email" 
                placeholder="tu@email.com" 
                required
                autocomplete="email"
              >
            </div>
          </div>

          <!-- Camp d'assistència -->
          <div class="form-group">
            <label class="radio-label">Podràs assistir? *</label>
            <div class="radio-options-horizontal">
              <label class="radio-option-clean">
                <input type="radio" name="asistencia" value="si" required>
                <span class="radio-text">✓ Sí, hi seré!</span>
              </label>
              <label class="radio-option-clean">
                <input type="radio" name="asistencia" value="no" required>
                <span class="radio-text">✗ No podré assistir-hi</span>
              </label>
            </div>
          </div>

          <!-- Camp de transport - visible si assisteix -->
          <div class="form-group" id="transport-group" style="display:none;">
            <label class="radio-label">Transport *</label>
            <div class="radio-options-horizontal">
              <label class="radio-option-clean">
                <input type="radio" name="bus" value="bus">
                <span class="radio-text">Bus proporcionat</span>
              </label>
              <label class="radio-option-clean">
                <input type="radio" name="bus" value="coche">
                <span class="radio-text">Cotxo propi</span>
              </label>
            </div>

            <!-- Sub-opcions bus - visible si tria bus -->
            <div id="bus-trayecto-group" style="display:none;" class="bus-trayecto-box">
              <label class="radio-label">Quin trajecte necessites? *</label>
              <div class="radio-options-transport-sub">
                <label class="radio-option-clean">
                  <input type="radio" name="bus_trayecto" value="anada_tornada">
                  <span class="radio-text">Anada i tornada</span>
                </label>
                <label class="radio-option-clean">
                  <input type="radio" name="bus_trayecto" value="nomes_anada">
                  <span class="radio-text">Només anada</span>
                </label>
                <label class="radio-option-clean">
                  <input type="radio" name="bus_trayecto" value="nomes_tornada">
                  <span class="radio-text">Només tornada</span>
                </label>
              </div>
            </div>

            <!-- Detalls cotxe - visible si tria cotxe -->
            <div id="car-details-group" style="display:none;" class="car-details-box">
              <label for="car_people">Quantes persones anau dins es cotxo? *</label>
              <textarea
                id="car_people"
                placeholder="Amb qui vas dins es cotxo?"
                rows="3"
              ></textarea>
              <p class="car-details-hint">Aquesta informació ens ajuda a organitzar es parking a sa finca.</p>
            </div>
          </div>

          <!-- Suggeriments de cançons -->
          <div class="form-group song-suggestion-group" id="song-group" style="display:none;">
            <label for="song" class="song-label">
              Suggereix una cançó per a la festa!
            </label>
            <p class="song-hint">Quina cançó no pot faltar per fer ballar tothom?</p>
            <input 
              type="text" 
              id="song" 
              placeholder="Títol i artista de la cançó..."
            >
          </div>

          <div class="form-group">
            <label for="comment">Comentaris o al·lèrgies (opcional)</label>
            <textarea
              id="comment"
              placeholder="Comenta-mos si tens qualque al·lèrgia alimentària, restricció dietètica o qualsevol altre cosa que hauríem de saber..."
              rows="4"
            ></textarea>
          </div>

          <button type="submit" class="btn-submit">Confirmar Assistència</button>
        </form>
      </div>
    </div>
  </section>

  <!-- FOOTER -->
  <footer>
    <p>Fet amb 💛 per un dia inolvidable</p>
    <p class="footer-date">19 · Setembre · 2026</p>
  </footer>

  <!-- Scripts -->
  <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
  <script src="config.js"></script>
  <script src="app.js"></script>
  <script>
    // Menú hamburguesa
    const hamburger = document.querySelector('.hamburger');
    const navMenu = document.querySelector('.nav-menu');

    if (hamburger && navMenu) {
      hamburger.addEventListener('click', () => {
        navMenu.classList.toggle('active');
      });
      document.querySelectorAll('.nav-menu a').forEach(link => {
        link.addEventListener('click', () => {
          navMenu.classList.remove('active');
        });
      });
    }

    // Elements
    const asistenciaRadios = document.querySelectorAll('input[name="asistencia"]');
    const transportGroup   = document.getElementById('transport-group');
    const songGroup        = document.getElementById('song-group');
    const busRadios        = document.querySelectorAll('input[name="bus"]');
    const busTrayectoGroup = document.getElementById('bus-trayecto-group');
    const busTrayectoRadios= document.querySelectorAll('input[name="bus_trayecto"]');
    const carDetailsGroup  = document.getElementById('car-details-group');
    const carPeopleTextarea= document.getElementById('car_people');

    function resetTransport() {
      busTrayectoGroup.style.display = 'none';
      carDetailsGroup.style.display  = 'none';
      busTrayectoRadios.forEach(r => { r.required = false; r.checked = false; });
      busRadios.forEach(b => { b.required = false; b.checked = false; });
      carPeopleTextarea.required = false;
      carPeopleTextarea.value   = '';
    }

    // Mostrar/ocultar transport i cançó segons assistència
    asistenciaRadios.forEach(radio => {
      radio.addEventListener('change', (e) => {
        if (e.target.value === 'si') {
          transportGroup.style.display = 'block';
          songGroup.style.display      = 'block';
          busRadios.forEach(b => b.required = true);
        } else {
          transportGroup.style.display = 'none';
          songGroup.style.display      = 'none';
          resetTransport();
        }
      });
    });

    // Mostrar sub-opcions bus o detalls cotxe
    busRadios.forEach(radio => {
      radio.addEventListener('change', (e) => {
        if (e.target.value === 'bus') {
          busTrayectoGroup.style.display = 'block';
          busTrayectoRadios.forEach(r => r.required = true);
          carDetailsGroup.style.display  = 'none';
          carPeopleTextarea.required = false;
          carPeopleTextarea.value   = '';
        } else if (e.target.value === 'coche') {
          carDetailsGroup.style.display  = 'block';
          carPeopleTextarea.required = true;
          busTrayectoGroup.style.display = 'none';
          busTrayectoRadios.forEach(r => { r.required = false; r.checked = false; });
        }
      });
    });
  </script>
</body>
</html>
